# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
# Derived from: https://docs.readthedocs.io/en/stable/build-customization.html#install-dependencies-with-uv

# Required
version: 2

build:
  os: 'ubuntu-24.04'
  tools:
    python: '3.12'
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      # Install the project and its 'docs' dependency group. The compiled C
      # extension isn't needed to build the docs, so skip it (TAMP_BUILD_C_EXTENSIONS=0).
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" TAMP_BUILD_C_EXTENSIONS=0 uv sync --no-group dev --group docs

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

# If using Sphinx, optionally build your docs in additional formats such as PDF
formats:
  - pdf
